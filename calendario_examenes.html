<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de Exámenes CSE</title>
    <link rel="icon" type="image/png" href="https://github.com/cse-elisagundin/horarios_alumnos/blob/main/image.png?raw=true">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <style>
        :root { --c-primary: #243c7a; --c-accent: #fa65c3; --bg-body: #f4f6f9; --bg-card: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-body); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--bg-card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(36, 60, 122, 0.08); position: relative; }
        
        /* LOGIN */
        #login-area { text-align: center; padding: 40px 20px; }
        .password-input { width: 100%; max-width: 300px; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; margin-bottom: 20px; text-align: center; }
        .btn-login { background: var(--c-primary); color: white; border: none; padding: 15px 40px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; padding-bottom: 20px; }
        .brand { display: flex; align-items: center; gap: 15px; }
        .brand img { height: 50px; }
        .brand h1 { margin: 0; color: var(--c-primary); font-size: 24px; text-transform: uppercase; }
        .controls { display: flex; align-items: center; gap: 10px; }
        .btn-refresh { width: 42px; height: 42px; border-radius: 50%; border: 2px solid #eee; background: white; color: var(--c-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .month-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: var(--c-primary); color: white; padding: 12px 20px; border-radius: 12px; }
        .nav-btn { background: rgba(255,255,255,0.15); border: none; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 700; }
        .current-month { font-size: 18px; font-weight: 800; text-transform: uppercase; }
        .timeline-row { display: flex; border-bottom: 1px solid #f0f0f0; padding: 15px 0; }
        .timeline-row.today { background-color: #fff5fa; }
        .date-col { width: 90px; flex-shrink: 0; text-align: center; border-right: 2px solid #f0f0f0; margin-right: 20px; display: flex; flex-direction: column; }
        .date-col .day-num { font-size: 28px; font-weight: 900; color: var(--c-primary); }
        .exams-col { flex-grow: 1; display: flex; flex-wrap: wrap; gap: 10px; }
        .exam-pill { border-left: 4px solid var(--c-primary); padding: 6px 12px; border-radius: 8px; background: #fafafa; min-width: 120px; }
        .pill-subject { font-size: 11px; font-weight: 800; color: var(--c-accent); display: block; }
        .pill-student { font-size: 14px; font-weight: 700; }
        .loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 100; display: flex; align-items: center; justify-content: center; border-radius: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-area">
        <img src="https://github.com/cse-elisagundin/horarios_alumnos/blob/main/image.png?raw=true" height="80" style="margin-bottom:20px">
        <h1>Control de Exámenes</h1>
        <input type="password" id="passInput" class="password-input" placeholder="Contraseña...">
        <br>
        <button class="btn-login" onclick="validar()">Entrar</button>
        <p id="error" style="color:red; display:none">Acceso denegado</p>
    </div>

    <div id="main-app" class="hidden">
        <header>
            <div class="brand">
                <img src="https://github.com/cse-elisagundin/horarios_alumnos/blob/main/image.png?raw=true" alt="Logo">
                <h1>Exámenes</h1>
            </div>
            <div class="controls">
                <button class="btn-refresh" onclick="cargarDatos()">↻</button>
                <select id="alumnoSelect" style="width: 250px;">
                    <option value="todos">👥 Ver todos</option>
                </select>
            </div>
        </header>

        <div class="month-nav">
            <button class="nav-btn" onclick="cambiarMes(-1)">&#10094;</button>
            <span class="current-month" id="monthDisplay">...</span>
            <button class="nav-btn" onclick="cambiarMes(1)">&#10095;</button>
        </div>

        <div id="timeline"></div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwQoSY2ESLhQjLB5lnFs0UFyRr2_RgnkttvtPWLPhobriDanlKEl_VnPCnkUtqFAYDK/exec";
    let examenes = [];
    let mesVisualizado = new Date();
    let globalPass = "";

    function validar() {
        globalPass = $('#passInput').val();
        cargarDatos();
    }

    async function cargarDatos() {
        $('#error').hide();
        try {
            const res = await fetch(`${API_URL}?action=calendario_examenes&pass=${globalPass}`);
            const data = await res.json();
            
            if(data.error) {
                $('#error').show();
                return;
            }

            $('#login-area').hide();
            $('#main-app').removeClass('hidden');

            // Procesar alumnos select
            const select = $('#alumnoSelect');
            select.empty().append(new Option("👥 Ver todos", "todos"));
            data.alumnos.sort().forEach(n => { if(n) select.append(new Option(n, n)); });
            $('#alumnoSelect').select2();

            // Procesar examenes
            examenes = data.examenes.slice(1).map(r => ({
                fecha: r[0], asignatura: r[1], alumno: r[2]
            }));

            renderTimeline();
        } catch(e) { alert("Error de conexión"); }
    }

    function renderTimeline() {
        const container = $('#timeline').empty();
        const alumnoSel = $('#alumnoSelect').val();
        const year = mesVisualizado.getFullYear();
        const month = mesVisualizado.getMonth();
        
        $('#monthDisplay').text(mesVisualizado.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' }));

        const diasMes = new Date(year, month + 1, 0).getDate();
        const hoyStr = new Date().toISOString().split('T')[0];

        for(let dia = 1; dia <= diasMes; dia++) {
            const fStr = `${year}-${String(month+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
            const evs = examenes.filter(ex => ex.fecha === fStr && (alumnoSel === "todos" || ex.alumno === alumnoSel));

            if(evs.length > 0 || fStr === hoyStr) {
                const row = $(`<div class="timeline-row ${fStr === hoyStr ? 'today' : ''}">
                    <div class="date-col"><span class="day-num">${dia}</span></div>
                    <div class="exams-col"></div>
                </div>`);
                
                if(evs.length > 0) {
                    evs.forEach(e => {
                        row.find('.exams-col').append(`<div class="exam-pill"><span class="pill-subject">${e.asignatura}</span><span class="pill-student">${e.alumno}</span></div>`);
                    });
                } else {
                    row.find('.exams-col').append('<span style="color:#ccc; font-style:italic">Hoy</span>');
                }
                container.append(row);
            }
        }
    }

    function cambiarMes(d) {
        mesVisualizado.setMonth(mesVisualizado.getMonth() + d);
        renderTimeline();
    }

    $('#alumnoSelect').on('change', renderTimeline);
</script>
</body>
</html>
