<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión CSE Elisa Gundín</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/cse-elisagundin/horarios_alumnos/main/image.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --c-primary: #243c7a; --c-secondary: #2b94cc; --c-accent: #fa65c3; --bg-body: #f4f6f9; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-body); font-size: 13px; }
        .login-container { background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(36,60,122,0.12); }
        .tab-btn { padding: 10px 24px; font-weight: 800; text-transform: uppercase; color: #888; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--c-primary); border-bottom-color: var(--c-accent); }
        @media print {
            #app-main-content { display: none !important; }
            #zona-impresion { display: block !important; position: absolute; left:0; top:0; width:100%; }
        }
    </style>
</head>
<body class="h-screen overflow-hidden">

<div id="zona-impresion" class="hidden"></div>

<div id="app" class="h-full">
    <transition name="fade">
        <div v-if="!authenticated" class="fixed inset-0 z-50 flex items-center justify-center bg-[#f4f6f9]">
            <div class="login-container p-10 w-full max-w-md text-center">
                <img src="https://raw.githubusercontent.com/cse-elisagundin/horarios_alumnos/main/image.png" class="h-20 mx-auto mb-6">
                <h2 class="text-2xl font-extrabold text-[#243c7a] mb-4 uppercase">Acceso Privado</h2>
                <input type="password" v-model="passwordInput" @keyup.enter="login" placeholder="Contraseña..." class="w-full p-4 rounded-xl border-2 text-center text-lg mb-4 outline-none focus:border-[#2b94cc]">
                <button @click="login" class="w-full py-4 text-white font-bold rounded-xl bg-[#243c7a] uppercase shadow-lg">Entrar</button>
            </div>
        </div>
    </transition>

    <div v-if="authenticated" class="flex h-full">
        <div class="w-1/4 bg-white border-r flex flex-col shadow-xl z-20">
            <div class="p-5 bg-[#243c7a] text-white flex items-center gap-3">
                <img src="https://raw.githubusercontent.com/cse-elisagundin/horarios_alumnos/main/image.png" class="h-8 bg-white p-1 rounded">
                <h1 class="font-bold text-lg leading-tight">Gestión<br><span class="text-[#fa65c3]">Alumnos</span></h1>
            </div>
            <div class="p-4 bg-gray-50 border-b space-y-3">
                <input v-model="search" type="text" placeholder="Buscar alumno..." class="w-full p-2.5 rounded-lg border outline-none">
                <button @click="createNew" class="w-full bg-[#2b94cc] text-white py-2.5 rounded-lg font-bold shadow hover:bg-[#207bb0]">Nueva Ficha</button>
            </div>
            <div class="flex-1 overflow-y-auto">
                <div v-for="s in filteredList" :key="s.id" @click="selectStudent(s)" class="p-4 border-b hover:bg-blue-50 cursor-pointer" :class="selected && selected.id === s.id ? 'bg-blue-50 border-l-4 border-[#fa65c3]' : ''">
                    <div class="font-bold text-[#243c7a]">{{ s.apellidos }}, {{ s.nombre }}</div>
                    <div class="text-xs text-gray-500 uppercase">{{ s.curso }} - {{ s.dni }}</div>
                </div>
            </div>
        </div>

        <div class="w-3/4 bg-[#f4f6f9] p-8 overflow-y-auto">
            <div v-if="selected" class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <div class="p-6 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                    <div>
                        <h2 class="text-2xl font-extrabold text-[#243c7a]">{{ isNew ? 'Nuevo Registro' : form.nombre + ' ' + form.apellidos }}</h2>
                        <div v-if="!isNew" class="flex gap-4 mt-2">
                            <button @click="activeTab = 'ficha'" class="tab-btn" :class="{active: activeTab==='ficha'}">Ficha</button>
                            <button @click="activeTab = 'pagos'" class="tab-btn" :class="{active: activeTab==='pagos'}">Pagos</button>
                        </div>
                    </div>
                    <button @click="saveData" class="bg-[#25D366] text-white px-8 py-2 rounded-lg font-bold shadow-lg">Guardar</button>
                </div>

                <div v-if="activeTab==='ficha'" class="p-8 grid grid-cols-3 gap-6">
                    <input v-model="form.nombre" placeholder="Nombre" class="p-3 border rounded-lg bg-gray-50">
                    <input v-model="form.apellidos" placeholder="Apellidos" class="p-3 border rounded-lg bg-gray-50">
                    <input v-model="form.dni" placeholder="DNI" class="p-3 border rounded-lg bg-gray-50">
                </div>

                <div v-if="activeTab==='pagos'" class="p-8 space-y-8 bg-gray-50">
                    <div class="bg-white p-6 rounded-xl border border-[#2b94cc]">
                        <h3 class="font-bold text-[#243c7a] mb-4 uppercase">Control Mensual</h3>
                        <div class="grid grid-cols-4 gap-4">
                            <div v-for="mes in mesesFijos" class="p-4 border rounded-xl text-center" :class="mes.bgClass">
                                <div class="text-[10px] font-bold text-gray-400 mb-1">{{ mes.mesNombre }}</div>
                                <div class="text-xl font-black">{{ mes.cuota }}€</div>
                                <button @click="actualizarFijo(mes.mesNombre, 'estado', !mes.pagado, mes)" class="w-full mt-2 py-1.5 rounded-lg text-xs font-bold text-white" :class="mes.pagado ? 'bg-green-500':'bg-red-400'">
                                    {{ mes.pagado ? 'PAGADO':'PENDIENTE' }}
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-xl border">
                        <div class="flex justify-between mb-4 border-b pb-2">
                            <h3 class="font-bold text-[#fa65c3] uppercase">Registrar Nuevo Pago</h3>
                            <button @click="imprimirTicketRapido" class="text-xs font-bold bg-gray-100 px-3 py-1 rounded hover:bg-gray-200">🖨️ Imprimir Recibo</button>
                        </div>
                        <div class="grid grid-cols-3 gap-4">
                            <input type="date" v-model="nuevoPago.fecha" class="p-2 border rounded">
                            <select v-model="nuevoPago.mes" class="p-2 border rounded bg-white">
                                <option v-for="m in ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']">{{m}}</option>
                            </select>
                            <select v-model="nuevoPago.metodo" class="p-2 border rounded bg-white">
                                <option>Efectivo</option><option>Bizum</option><option>Transferencia</option><option>Tarjeta</option>
                            </select>
                            <select v-model="nuevoPago.tarifaSelect" class="col-span-2 p-2 border rounded font-bold text-[#243c7a] bg-white">
                                <option value="Opción 1 (40€)">Opción 1 (40€)</option>
                                <option value="Opción 2 (50€)">Opción 2 (50€)</option>
                                <option value="Opción 3 (80€)">Opción 3 (80€)</option>
                                <option value="Opción 4 (85€)">Opción 4 (85€)</option>
                                <option value="Opción 5 (110€)">Opción 5 (110€)</option>
                                <option value="Opción 6 (135€)">Opción 6 (135€)</option>
                                <option value="personalizada">✏️ Concepto Personalizado...</option>
                            </select>
                            <input v-if="nuevoPago.tarifaSelect==='personalizada'" v-model="nuevoPago.tarifaPersImporte" type="number" placeholder="€" class="p-2 border rounded">
                        </div>
                        <div class="mt-6 pt-4 border-t flex justify-between items-center">
                            <div class="text-2xl font-black text-[#243c7a]">{{ importeCalculado }}€</div>
                            <div class="flex items-center gap-4">
                                <label class="flex items-center gap-2 cursor-pointer text-xs font-bold text-gray-500">
                                    <input type="checkbox" v-model="nuevoPago.generarPDF" class="w-4 h-4"> Guardar en Drive
                                </label>
                                <button @click="registrarPago" class="bg-[#2b94cc] text-white px-10 py-3 rounded-xl font-bold">GUARDAR PAGO</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                authenticated: false, passwordInput: '', apiUrl: 'AQUÍ_VA_TU_URL_DE_IMPLEMENTACIÓN',
                list: [], fijosRaw: [], search: '', selected: null, isNew: false, 
                activeTab: 'ficha', nuevoPago: this.pagoVacio(),
                form: {}
            }
        },
        computed: {
            filteredList() {
                const t = this.search.toLowerCase();
                return this.list.filter(s => (s.nombre + s.apellidos).toLowerCase().includes(t));
            },
            mesesFijos() {
                if(!this.selected || this.fijosRaw.length === 0) return [];
                const headers = this.fijosRaw[0];
                const alumnoNorm = (this.form.nombre + " " + this.form.apellidos).toLowerCase();
                const fila = this.fijosRaw.find(r => r[1] && r[1].toLowerCase().trim() === alumnoNorm);
                if(!fila) return [];
                let meses = [];
                for(let i=2; i<headers.length; i+=2) {
                    if(headers[i]) {
                        meses.push({ mesNombre: headers[i], cuota: fila[i], pagado: String(fila[i+1]).toUpperCase()==='TRUE', bgClass: fila[i+1] ? 'bg-green-50':'bg-red-50' });
                    }
                }
                return meses;
            },
            importeCalculado() {
                if(this.nuevoPago.tarifaSelect === 'personalizada') return Number(this.nuevoPago.tarifaPersImporte) || 0;
                const match = this.nuevoPago.tarifaSelect.match(/\((\d+)€\)/);
                return match ? Number(match[1]) : 0;
            }
        },
        watch: {
            'nuevoPago.mes'(newMes) {
                const mesFijo = this.mesesFijos.find(m => m.mesNombre.toLowerCase().includes(newMes.toLowerCase()));
                if(mesFijo && mesFijo.cuota) {
                    const cuota = Number(mesFijo.cuota);
                    const mapping = { 40: "Opción 1 (40€)", 50: "Opción 2 (50€)", 80: "Opción 3 (80€)", 85: "Opción 4 (85€)", 110: "Opción 5 (110€)", 135: "Opción 6 (135€)" };
                    if(mapping[cuota]) this.nuevoPago.tarifaSelect = mapping[cuota];
                    else { this.nuevoPago.tarifaSelect = 'personalizada'; this.nuevoPago.tarifaPersImporte = cuota; }
                }
            }
        },
        methods: {
            pagoVacio() { return { fecha: new Date().toISOString().split('T')[0], mes: 'Marzo', metodo: 'Efectivo', tarifaSelect: '', tarifaPersImporte: '', generarPDF: false }; },
            login() { if(btoa(this.passwordInput) === 'MDEwNTIz') { this.authenticated = true; this.loadData(); } },
            async loadData() {
                const res = await fetch(this.apiUrl);
                const json = await res.json();
                this.list = json.data; this.fijosRaw = json.fijos;
            },
            selectStudent(s) { this.selected = s; this.form = {...s}; this.activeTab = 'ficha'; },
            async registrarPago() {
                let tarifaFinal = this.nuevoPago.tarifaSelect;
                if(tarifaFinal==='personalizada') tarifaFinal = `Concepto (${this.nuevoPago.tarifaPersImporte}€)`;
                const payload = { action: 'create_pago', alumno: this.form.nombre + ' ' + this.form.apellidos, tarifa: tarifaFinal, fecha: this.nuevoPago.fecha, mes: this.nuevoPago.mes, metodo: this.nuevoPago.metodo, importe: this.importeCalculado, generarPDF: this.nuevoPago.generarPDF };
                await fetch(this.apiUrl, { method: 'POST', body: JSON.stringify(payload) });
                alert("Pago registrado"); this.nuevoPago = this.pagoVacio(); this.loadData();
            },
            imprimirTicketRapido() {
                const fechaE = new Date(this.nuevoPago.fecha).toLocaleDateString('es-ES');
                const html = `
                    <div style="max-width:700px; margin:0 auto; padding:40px; border:2px solid #000; font-family:sans-serif;">
                        <div style="display:flex; justify-content:space-between; border-bottom:2px solid #000; padding-bottom:10px;">
                            <img src="https://raw.githubusercontent.com/cse-elisagundin/horarios_alumnos/main/image.png" style="height:70px">
                            <div style="text-align:right; font-size:12px"><strong>CSE ELISA GUNDÍN</strong><br>NIF: 20054671M<br>C/ Alicante 4, El Pinós (03650)</div>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:12px; border-bottom:2px solid #000; padding:10px 0; margin-bottom:20px;">
                            <div>Nº RECIBO: TEMP</div><div>FECHA: ${fechaE}</div><div>PAGO: ${this.nuevoPago.metodo.toUpperCase()}</div>
                        </div>
                        <p style="font-size:10px; margin:0">RECIBÍ DE:</p>
                        <h3 style="margin:5px 0; text-transform:uppercase">${this.form.nombre} ${this.form.apellidos}</h3>
                        <table style="width:100%; border-collapse:collapse; margin-top:30px">
                            <tr style="border-bottom:1px solid #000"><th style="text-align:left">CONCEPTO</th><th style="text-align:right">IMPORTE</th></tr>
                            <tr><td style="padding:100px 0">Mensualidad ${this.nuevoPago.mes}</td><td style="text-align:right; font-weight:bold">${this.importeCalculado.toFixed(2)} €</td></tr>
                        </table>
                        <div style="background:#eee; padding:10px; border:2px solid #000; font-weight:bold; font-size:20px; text-align:right;">TOTAL: ${this.importeCalculado.toFixed(2)} €</div>
                    </div>
                `;
                document.getElementById('zona-impresion').innerHTML = html;
                window.print();
            }
        }
    }).mount('#app');
</script>
</body>
</html>
